name: CyberPilot SMSI - Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  security-events: write   # Pour afficher les vulnérabilités
  actions: read            # Fix erreur "Resource not accessible"

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java (pour projet Spring / Maven)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Build du projet
      - name: Build Project
        run: mvn install -DskipTests

      # 4. Scan sécurité avec Trivy
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # 5. Upload des résultats dans GitHub Security
      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v4
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: 'trivy-results.sarif'
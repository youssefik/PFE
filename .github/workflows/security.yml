name: CyberPilot SMSI - Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read
  security-events: write  # Obligatoire pour afficher les alertes dans l'onglet Security

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # On compile pour s'assurer que toutes les dépendances sont là
      - name: Build Project
        run: mvn install -DskipTests

      # Scan de sécurité avec Trivy (Remplace OWASP et Snyk)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'           # Scan le système de fichiers
          scan-ref: '.'             # Scan tout le projet
          format: 'sarif'           # Format pour GitHub Security
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH' # On se concentre sur le plus grave

      # Upload des résultats pour voir les failles dans l'interface GitHub
      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
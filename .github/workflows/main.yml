name: CyberPilot SMSI CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Cache Maven dependencies (optionnel) et surtout OWASP DB
      - name: Cache OWASP Database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-db-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-db-${{ runner.os }}-

      # Build
      - name: Build with Maven
        run: mvn clean package -DskipTests -Dfile.encoding=UTF-8

      # Vérifier la présence de la clé API NVD
      - name: Check NVD API key availability
        id: nvd_key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      # Security Scan (uniquement si la clé est présente)
      - name: Security Scan (Dependency Check)
        if: steps.nvd_key.outputs.has_key == 'true'
        env:
          API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=$API_KEY \
            -DnvdApiDelay=20000 \
            -DautoUpdate=true

      # Archiver le cache OWASP en tant qu'artefact (pour le télécharger manuellement)
      - name: Archive OWASP cache
        if: steps.nvd_key.outputs.has_key == 'true'
        run: |
          tar -czf owasp-cache.tar.gz -C ~/.m2/repository/org/owasp dependency-check-data

      - name: Upload cache artifact
        if: steps.nvd_key.outputs.has_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: owasp-cache
          path: owasp-cache.tar.gz

      # Rapport de sécurité (si le scan a été exécuté)
      - name: Upload Security Report
        if: always() && steps.nvd_key.outputs.has_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: target/security-reports/dependency-check-report.html

      # Message si la clé est absente
      - name: Security Scan skipped
        if: steps.nvd_key.outputs.has_key != 'true'
        run: echo "Dependency-Check skipped because NVD_API_KEY is not configured."

      - name: Check NVD API key availability
        id: nvd_key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi
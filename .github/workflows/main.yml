name: CyberPilot SMSI CI/CD Pipeline

# Déclencheurs : le pipeline se lance à chaque push ou pull request sur la branche main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-security-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Installation du JDK (Java 17 - standard pour Spring Boot 3)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Mise en cache des dépendances pour gagner du temps

      # 3. Compilation et Tests Unitaires
      # Cette étape échouera si tes tests Junit (calcul des risques) ne passent pas
      - name: Build and Test with Maven
        run: mvn clean verify

      # 4. Scan de Sécurité des Dépendances (Vraie valeur ajoutée ISO 27001)
      # Vérifie si tes bibliothèques (Spring, Hibernate, POI) ont des vulnérabilités connues (CVE)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CyberPilot-SMSI'
          path: '.'
          format: 'HTML'
          out: 'reports/security'

      # 5. Archivage du Rapport de Sécurité
      # Tu pourras télécharger ce fichier HTML depuis GitHub pour le montrer au jury
      - name: Archive Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Rapport-Securite-CVE
          path: reports/security/dependency-check-report.html

      # 6. Archivage de l'application (Fichier JAR)
      - name: Archive Production Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPilot-App-JAR
          path: target/*.jar

  # ÉTAPE OPTIONNELLE : Notification de succès (par exemple via console)
  notify:
    needs: build-and-security-check
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Success Message
        run: echo "Le pipeline a terminé avec succès. Le SMSI est intègre et sécurisé."
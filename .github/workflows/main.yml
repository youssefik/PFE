name: CyberPilot SMSI CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Forcer l'environnement sur Node.js 24 pour les futures compatibilités
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-security-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Utilisation du Fetch-depth pour éviter les erreurs RPC
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compilation sans filtrage de ressources corrompues si nécessaire
      # Note : on ajoute l'encodage forcé ici aussi par sécurité
      - name: Build with Maven
        run: mvn clean package -Dfile.encoding=UTF-8 -DskipTests

      # 4. Scan de Sécurité (On passe le skip de build Maven pour gagner du temps)
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CyberPilot-SMSI'
          path: '.'
          format: 'HTML'
          out: 'reports/security'
          args: >
            --failOnCVSS 7

      # 5. Archivage
      - name: Upload Security Report
        if: always() # Toujours envoyer le rapport même si échec
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/security/
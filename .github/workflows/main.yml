name: CyberPilot SMSI CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ÉTAPE 1 : Compilation et Build (Gère aussi l'encodage)
      - name: Build with Maven
        run: mvn clean package -DskipTests -Dfile.encoding=UTF-8

      # ÉTAPE 2 : Scan de Sécurité via Maven (Plus de problème JAVA_HOME)
      - name: Security Scan (Dependency Check)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "NVD_API_KEY secret is missing. Configure it in GitHub repository secrets." >&2
            exit 1
          fi
          mvn org.owasp:dependency-check-maven:check

      # ÉTAPE 3 : Archivage du Rapport HTML
      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: target/security-reports/dependency-check-report.html